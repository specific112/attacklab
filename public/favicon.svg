<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hoodie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a6a8a"/>
      <stop offset="100%" stop-color="#2a3450"/>
    </linearGradient>
    <linearGradient id="hoodieInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4a6a"/>
      <stop offset="100%" stop-color="#1a2040"/>
    </linearGradient>
    <linearGradient id="laptop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0ff"/>
      <stop offset="100%" stop-color="#c0d0e8"/>
    </linearGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff3333"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="60" fill="#0d1117"/>

  <!-- Circuit network lines - left side -->
  <g stroke="#3a7bd5" stroke-width="3" fill="none" opacity="0.6">
    <line x1="30" y1="120" x2="100" y2="120"/>
    <line x1="100" y1="120" x2="100" y2="180"/>
    <line x1="100" y1="180" x2="160" y2="180"/>
    <line x1="30" y1="200" x2="80" y2="200"/>
    <line x1="80" y1="200" x2="80" y2="260"/>
    <line x1="80" y1="260" x2="140" y2="260"/>
    <line x1="30" y1="320" x2="100" y2="320"/>
    <line x1="100" y1="320" x2="100" y2="380"/>
    <line x1="100" y1="380" x2="170" y2="380"/>
    <line x1="50" y1="420" x2="120" y2="420"/>
    <line x1="120" y1="420" x2="120" y2="360"/>
  </g>

  <!-- Circuit network lines - right side -->
  <g stroke="#3a7bd5" stroke-width="3" fill="none" opacity="0.6">
    <line x1="412" y1="120" x2="482" y2="120"/>
    <line x1="412" y1="120" x2="412" y2="180"/>
    <line x1="412" y1="180" x2="352" y2="180"/>
    <line x1="432" y1="200" x2="482" y2="200"/>
    <line x1="432" y1="200" x2="432" y2="260"/>
    <line x1="432" y1="260" x2="372" y2="260"/>
    <line x1="412" y1="320" x2="482" y2="320"/>
    <line x1="412" y1="320" x2="412" y2="380"/>
    <line x1="412" y1="380" x2="342" y2="380"/>
    <line x1="392" y1="420" x2="482" y2="420"/>
    <line x1="392" y1="420" x2="392" y2="360"/>
  </g>

  <!-- Circuit nodes - left -->
  <g filter="url(#nodeGlow)">
    <circle cx="30" cy="120" r="8" fill="#3a7bd5"/>
    <circle cx="100" cy="120" r="6" fill="#4a8be5"/>
    <circle cx="100" cy="180" r="6" fill="#4a8be5"/>
    <circle cx="160" cy="180" r="8" fill="#3a7bd5"/>
    <circle cx="30" cy="200" r="8" fill="#3a7bd5"/>
    <circle cx="80" cy="200" r="6" fill="#4a8be5"/>
    <circle cx="80" cy="260" r="6" fill="#4a8be5"/>
    <circle cx="140" cy="260" r="8" fill="#3a7bd5"/>
    <circle cx="30" cy="320" r="8" fill="#3a7bd5"/>
    <circle cx="100" cy="320" r="6" fill="#4a8be5"/>
    <circle cx="100" cy="380" r="6" fill="#4a8be5"/>
    <circle cx="170" cy="380" r="8" fill="#3a7bd5"/>
    <circle cx="50" cy="420" r="7" fill="#3a7bd5"/>
    <circle cx="120" cy="420" r="6" fill="#4a8be5"/>
  </g>

  <!-- Circuit nodes - right -->
  <g filter="url(#nodeGlow)">
    <circle cx="482" cy="120" r="8" fill="#3a7bd5"/>
    <circle cx="412" cy="120" r="6" fill="#4a8be5"/>
    <circle cx="412" cy="180" r="6" fill="#4a8be5"/>
    <circle cx="352" cy="180" r="8" fill="#3a7bd5"/>
    <circle cx="482" cy="200" r="8" fill="#3a7bd5"/>
    <circle cx="432" cy="200" r="6" fill="#4a8be5"/>
    <circle cx="432" cy="260" r="6" fill="#4a8be5"/>
    <circle cx="372" cy="260" r="8" fill="#3a7bd5"/>
    <circle cx="482" cy="320" r="8" fill="#3a7bd5"/>
    <circle cx="412" cy="320" r="6" fill="#4a8be5"/>
    <circle cx="412" cy="380" r="6" fill="#4a8be5"/>
    <circle cx="342" cy="380" r="8" fill="#3a7bd5"/>
    <circle cx="482" cy="420" r="7" fill="#3a7bd5"/>
    <circle cx="392" cy="420" r="6" fill="#4a8be5"/>
  </g>

  <!-- Hoodie outer shape -->
  <path d="M 160 440 Q 160 340 190 280 Q 200 250 210 230 L 256 170 L 302 230 Q 312 250 322 280 Q 352 340 352 440 Z" fill="url(#hoodie)"/>

  <!-- Hoodie hood -->
  <path d="M 170 280 Q 170 180 256 140 Q 342 180 342 280 Q 330 260 256 250 Q 182 260 170 280 Z" fill="url(#hoodieInner)"/>

  <!-- Hood opening shadow -->
  <ellipse cx="256" cy="220" rx="55" ry="50" fill="#1a2040"/>

  <!-- Face area - skin -->
  <ellipse cx="256" cy="225" rx="40" ry="35" fill="#e8c4a0"/>

  <!-- Hood shadow over face top -->
  <path d="M 216 210 Q 256 190 296 210 Q 280 200 256 198 Q 232 200 216 210 Z" fill="#1a2040"/>

  <!-- Eyes - dark with glow -->
  <g filter="url(#glow)">
    <ellipse cx="240" cy="222" rx="10" ry="7" fill="#ff3333"/>
    <ellipse cx="272" cy="222" rx="10" ry="7" fill="#ff3333"/>
    <ellipse cx="240" cy="221" rx="5" ry="4" fill="#ff6666"/>
    <ellipse cx="272" cy="221" rx="5" ry="4" fill="#ff6666"/>
  </g>

  <!-- Laptop body -->
  <rect x="195" y="310" width="122" height="80" rx="8" fill="url(#laptop)" stroke="#a0b0c8" stroke-width="2"/>

  <!-- Laptop screen -->
  <rect x="202" y="316" width="108" height="58" rx="4" fill="#1a2a3a"/>

  <!-- Screen content - code lines -->
  <rect x="212" y="324" width="40" height="3" rx="1" fill="#3a7bd5" opacity="0.7"/>
  <rect x="212" y="332" width="60" height="3" rx="1" fill="#4a8be5" opacity="0.5"/>
  <rect x="212" y="340" width="30" height="3" rx="1" fill="#3a7bd5" opacity="0.6"/>
  <rect x="212" y="348" width="50" height="3" rx="1" fill="#5a9bf5" opacity="0.4"/>
  <rect x="212" y="356" width="35" height="3" rx="1" fill="#3a7bd5" opacity="0.7"/>
  <rect x="212" y="364" width="55" height="3" rx="1" fill="#4a8be5" opacity="0.5"/>

  <!-- Screen eye/camera -->
  <circle cx="256" cy="330" r="5" fill="#ff3333" opacity="0.8"/>

  <!-- Laptop base/keyboard -->
  <rect x="185" y="392" width="142" height="8" rx="3" fill="#b0c0d8"/>

  <!-- Circuit lines from laptop -->
  <g stroke="#3a7bd5" stroke-width="2" fill="none" opacity="0.5">
    <line x1="195" y1="350" x2="160" y2="350"/>
    <line x1="160" y1="350" x2="160" y2="300"/>
    <line x1="317" y1="350" x2="352" y2="350"/>
    <line x1="352" y1="350" x2="352" y2="300"/>
  </g>

  <!-- Bottom circuit nodes from laptop -->
  <circle cx="160" cy="300" r="5" fill="#3a7bd5" filter="url(#nodeGlow)"/>
  <circle cx="352" cy="300" r="5" fill="#3a7bd5" filter="url(#nodeGlow)"/>
</svg>
